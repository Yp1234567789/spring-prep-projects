spring.application.name=spring-ai
server.port=8180
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
spring.ai.openai.api-key=${OPENAI_API_KEY}
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
# Use forward slashes and add CASE_INSENSITIVE_IDENTIFIERS
spring.datasource.url=jdbc:h2:file:C:/springboot/spring-ai/spring-prep-projects/springai/chat-memory;AUTO_SERVER=true;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=test
spring.datasource.password=12345
spring.jpa.hibernate.ddl-auto=update
# Ensure Spring AI uses the H2 dialect
spring.ai.chat.memory.repository.jdbc.platform=h2
spring.ai.chat.memory.repository.jdbc.initialize-schema=always

spring.docker.compose.stop.command=down

spring.ai.vectorstore.qdrant.initialize-schema=true
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=test